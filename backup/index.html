    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Chat Hub</title>
        <style>
            :root {
                --primary: #8b5cf6; /* Vibrant Purple */
                --primary-dark: #7c3aed;
                --bot-green: #10b981;
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                --glass: rgba(255, 255, 255, 0.05);
                --glass-border: rgba(255, 255, 255, 0.1);
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { 
                font-family: 'Inter', -apple-system, sans-serif; 
                background: var(--bg-gradient);
                height: 100vh; display: flex; justify-content: center; align-items: center;
                color: white;
            }

            .container { 
                background: rgba(15, 23, 42, 0.8);
                backdrop-filter: blur(12px);
                width: 100%; max-width: 450px; height: 90vh; 
                border-radius: 24px; border: 1px solid var(--glass-border);
                display: flex; flex-direction: column; overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }

            .header {
                padding: 20px; text-align: center; border-bottom: 1px solid var(--glass-border);
                background: rgba(255,255,255,0.03);
            }

            .header h2 { font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase; opacity: 0.9; }

            #chat-box { 
                flex: 1; overflow-y: auto; padding: 20px; 
                display: flex; flex-direction: column; gap: 12px;
                scroll-behavior: smooth;
            }

            /* Scrollbar Styling */
            #chat-box::-webkit-scrollbar { width: 4px; }
            #chat-box::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

            .msg { 
                max-width: 75%; padding: 12px 16px; border-radius: 18px; 
                font-size: 0.95rem; position: relative;
                animation: slideUp 0.3s ease-out;
            }

            @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

            /* THE MIRROR LOGIC */
            .other-msg { background: var(--glass); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--glass-border); }
            .my-msg { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
            .bot-msg { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #d1fae5; align-self: flex-start; }

            .system-msg { align-self: center; font-size: 0.75rem; color: #94a3b8; background: none; padding: 4px; }

            .msg-name { font-size: 0.7rem; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; opacity: 0.7; }

            #login-section { padding: 40px; margin: auto; text-align: center; width: 100%; }
            
            .input-area { padding: 20px; background: rgba(0,0,0,0.2); display: flex; gap: 10px; }

            input {
                flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
                padding: 12px 18px; border-radius: 14px; color: white; outline: none;
            }
            input:focus { border-color: var(--primary); }

            button {
                padding: 10px 20px; background: var(--primary); color: white;
                border: none; border-radius: 12px; cursor: pointer; font-weight: bold;
                transition: 0.2s;
            }
            button:hover { background: var(--primary-dark); transform: translateY(-1px); }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header"><h2>ChatRoom</h2></div>
            
            <div id="login-section">
                <h1 style="margin-bottom: 20px; font-size: 1.5rem;">Enter Your Name To Join The ChatRoom</h1>
                <input type="text" id="username" placeholder="Identity Name..." onkeypress="if(event.key==='Enter') connect()">
                <button onclick="connect()" style="margin-top: 15px; width: 100%;">Initialize</button>
            </div>

            <div id="chat-section" style="display:none; flex-direction: column; flex: 1; min-height: 0;">
                <div id="chat-box"></div>
                <form class="input-area" onsubmit="sendMessage(event)">
                    <input type="text" id="messageText" placeholder="Command (!help)..." autocomplete="off">
                    <button>Send</button>
                </form>
            </div>
        </div>

        <script>
            var ws = null;
            var myName = "";

            function connect() {
                myName = document.getElementById("username").value;
                if (!myName) return;
                
                var proto = window.location.protocol === "https:" ? "wss://" : "ws://";
                ws = new WebSocket(proto + window.location.host + "/ws/" + myName);
                
                document.getElementById("login-section").style.display = "none";
                document.getElementById("chat-section").style.display = "flex";

                ws.onmessage = function(event) {
                    var chatBox = document.getElementById('chat-box');
                    var messageDiv = document.createElement('div');
                    
                    if (event.data.startsWith("System:")) {
                        messageDiv.className = 'msg system-msg';
                        messageDiv.innerText = event.data;
                    } else {
                        var parts = event.data.split(': ');
                        var sender = parts[0];
                        var text = parts.slice(1).join(': ');

                        // MIRROR LOGIC: Check who sent the message
                        if (sender === "Bot") {
                            messageDiv.className = 'msg bot-msg';
                        } else if (sender === myName) {
                            messageDiv.className = 'msg my-msg';
                        } else {
                            messageDiv.className = 'msg other-msg';
                        }
                        
                        messageDiv.innerHTML = `<div class="msg-name">${sender}</div><div>${text}</div>`;
                    }
                    
                    chatBox.appendChild(messageDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                };
            }

            function sendMessage(event) {
                event.preventDefault();
                var input = document.getElementById("messageText");
                if (input.value.trim() !== "") {
                    ws.send(input.value);
                    input.value = '';
                }
            }
        </script>
    </body>
    </html>
