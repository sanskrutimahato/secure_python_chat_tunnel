<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Hub</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Uses a free emoji CDN — no file needed -->
    <link rel="icon" href="https://fav.farm/💬" />
</head>
<body>

    <div class="chat-wrapper d-flex justify-content-center align-items-center min-vh-100">

        <!-- Main Container -->
        <div class="chat-container d-flex flex-column">

            <!-- Header -->
            <div class="chat-header d-flex align-items-center justify-content-between px-4 py-3">
                <div class="d-flex align-items-center gap-2">
                    <span class="status-dot"></span>
                    <span class="header-title">CHATROOM</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge-online" id="online-count">
                        <i class="bi bi-people-fill me-1"></i>
                        <span id="user-count">0</span> online
                    </span>
                </div>
            </div>

            <!-- Login Section -->
            <div id="login-section" class="d-flex flex-column justify-content-center align-items-center flex-grow-1 p-4">
                <div class="login-card text-center w-100">
                    <div class="login-icon mb-4">
                        <i class="bi bi-terminal-fill"></i>
                    </div>
                    <h1 class="login-title mb-2">Initialize Connection</h1>
                    <p class="login-subtitle mb-4">Enter your identity to join the chatroom</p>

                    <div class="input-group-custom mb-3">
                        <input
                            type="text"
                            id="username"
                            class="form-control custom-input"
                            placeholder="Identity name..."
                            autocomplete="off"
                            onkeypress="if(event.key==='Enter') connect()"
                        >
                    </div>

                    <button onclick="connect()" class="btn btn-primary-custom w-100">
                        <i class="bi bi-plug-fill me-2"></i>Connect
                    </button>
                </div>
            </div>

            <!-- Chat Section -->
            <div id="chat-section" class="d-none flex-column flex-grow-1" style="min-height:0;">

                <!-- Messages Area -->
                <div id="chat-box" class="flex-grow-1 overflow-auto px-3 py-3 d-flex flex-column gap-2"></div>

                <!-- Input Area -->
                <div class="input-area px-3 py-3">
                    <form id="message-form" class="d-flex gap-2 align-items-center">
                        <input
                            type="text"
                            id="messageText"
                            class="form-control custom-input flex-grow-1"
                            placeholder="Message or command (!help)..."
                            autocomplete="off"
                        >
                        <button type="submit" class="btn btn-send">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Script -->
    <script src="/static/script.js"></script>
</body>
</html>
